name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude-review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-review'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write GCP credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: echo "$GCP_CREDENTIALS" > /tmp/gcp-credentials.json

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          CLOUD_ML_REGION: global
        with:
          use_vertex: "true"
          trigger_phrase: "@claude-review"
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.pull_request && github.event.issue.number || github.event.pull_request.number }}

            Review this PR against the code in src/torchtalk/ and the rules in CLAUDE.md.

            Focus on substantive issues:
            - Bugs and regressions against existing behavior, especially edge cases like
              null/None fields, empty lists, and missing keys.
            - Scope creep: features added beyond what the PR description states.
            - Adherence to CLAUDE.md: dead code, module size (under 500 LOC), single-sentence
              tool docstrings, Protocol over ABC, composition over inheritance.
            - Missing test coverage for changed code paths.
            - Performance regressions on hot paths.

            Skip style and formatting nits — ruff already covers those in CI.

            Post findings as inline review comments on the diff. Be concise.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
